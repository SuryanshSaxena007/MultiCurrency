services:
  - type: web
    name: wallet-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /ready
    envVars:
      - key: WALLET_DATABASE_URL
        fromDatabase:
          name: wallet-db
          property: connectionString
      - key: WALLET_JWT_SECRET
        generateValue: true
      - key: WALLET_CORS_ORIGINS
        value: https://your-vercel-app.vercel.app
      - key: WALLET_ENABLE_EXTERNAL_RATES
        value: "true"

databases:
  - name: wallet-db
    databaseName: wallet
    user: wallet
